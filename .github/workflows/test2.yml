name: test2.yml

on: 
  workflow_dispatch:
  push:
    branches: [master]
    
jobs:
  ssc-ci-test:
    if: true
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:    
      - name: Check Out Source Code
        uses: actions/checkout@v6
      - name: Run SSC CI Test
        uses: fortify/github-action/.github/workflows/with-debug-upload-github.yml@feat/configurable-debug-upload
        env:
          SSC_URL: ${{ vars.FH_STAGE_SSC_URL }}
          SSC_USER: ${{secrets.FH_STAGE_SSC_USER}}
          SSC_PASSWORD: ${{secrets.FH_STAGE_SSC_PWD}}
          SC_SAST_TOKEN: ${{secrets.FH_STAGE_SC_SAST_TOKEN}}
          SSC_APPVERSION: GitHub:EightBall
          SC_CLIENT_VERSION: 25.4
          SAST_SCAN_EXTRA_OPTS: --no-replace
