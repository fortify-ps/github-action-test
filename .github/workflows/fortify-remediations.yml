name: Fortify AST Scan with remediations

# Customize trigger events based on your DevSecOps process and/or policy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  Fortify-AST-Scan:
    # Use the appropriate runner for building your source code. Ensure dev tools required to build your code are present and configured appropriately (MSBuild, Python, etc).
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      security-events: write
      pull-requests: write

    steps:
      # Check out source code
      - name: Check Out Source Code
        uses: actions/checkout@v6

      # Perform SAST and/or SCA scan via Fortify on Demand/Fortify Hosted/ScanCentral SAST/Debricked. Based on
      # configuration, the Fortify GitHub Action can optionally set up the application version/release, generate
      # job summaries and Pull Request comments, and/or export SAST results to the GitHub code scanning dashboard.
      # The Fortify GitHub Action provides many customization capabilities, but in case further customization is
      # required, you can use sub-actions like fortify/github-action/setup@v1 to set up the various Fortify tools
      # and run them directly from within your pipeline. It is recommended to review the Fortify GitHub Action
      # documentation at https://github.com/fortify/github-action#readme for more information on the various
      # configuration options and available sub-actions.
      - name: Run Fortify Scan
        uses: fortify/github-action@v3
        env:
          FCLI_BOOTSTRAP_VERSION: dev_feat.v3.x.create-pr-fcli-action
          SSC_URL: ${{ vars.FH_DEMO_SSC_URL }}
          SSC_USER: ${{secrets.FH_DEMO_SSC_USER}}
          SSC_PASSWORD: ${{secrets.FH_DEMO_SSC_PWD}}
          SC_SAST_TOKEN: ${{secrets.FH_DEMO_SC_SAST_TOKEN}}
          SAST_SCAN_EXTRA_OPTS: --no-replace --sargs "'-scan-policy' 'classic'"
          SC_CLIENT_VERSION: 25.4
          DO_AVIATOR_AUDIT: true
          DO_AVIATOR_REMEDIATIONS: true                    # Enable Aviator remediations for SAST scan, requires SSC 22.1 or later
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}          # GitHub token, required for PR comments and code scanning export
